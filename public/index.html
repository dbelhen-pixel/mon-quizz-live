<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Quizz Live</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #f4f6f8; color: #333; margin: 0; padding: 20px; }
        .hidden { display: none; }
        .btn { padding: 10px 20px; margin: 5px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; background: #007bff; color: white; }
        .btn-option { display: block; width: 80%; margin: 10px auto; background: #e9ecef; color: #333; }
        .btn-option:hover { background: #d3d9df; }
        .admin-controls { background: #ffeeba; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        #timer { font-size: 3em; font-weight: bold; color: #dc3545; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>Bienvenue sur le Quizz</h1>
        <input type="text" id="pseudo" placeholder="Entrez votre pseudo" style="padding:10px; font-size:16px;">
        <br><br>
        <button class="btn" onclick="joinGame()">Rejoindre le Quizz</button>
        <br><br><br>
        <button class="btn" style="background:#28a745;" onclick="becomeHost()">Je suis l'animateur</button>
    </div>

    <div id="game-screen" class="hidden">
        
        <div id="host-controls" class="admin-controls hidden">
            <h3>Contrôles Animateur</h3>
            <button class="btn" onclick="socket.emit('nextQuestion')">Lancer / Question Suivante</button>
            <button class="btn" onclick="socket.emit('pauseTimer')">⏸️ Pause Chrono</button>
            <button class="btn" onclick="socket.emit('resumeTimer')">▶️ Reprendre Chrono</button>
            <button class="btn" onclick="socket.emit('stopTimer')" style="background:#dc3545;">⏹️ Stopper Affichage Chrono</button>
        </div>

        <div id="timer-display">Temps restant : <span id="timer">10</span>s</div>
        
        <h2
